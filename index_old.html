<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Insights · Research Innovation Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2d344e;
    --card-fill: #f5f7fa;
    --card-border: #d9dee5;
    --img-placeholder: #e5e8ed;
    --white: #ffffff;
    --accent-magenta: #D9388C;   /* nav hover underline accent */
    --logo-magenta: #d9398c;     /* exact magenta from the logo */
    --maxw: 1080px;
    --gap-section: 60px;

    /* Type scale (mirrors the Figma text styles) */
    --h1-size: 64px;       --h1-lh: 1.2;
    --stat-size: 48px;     --stat-lh: 1.1;
    --h2-size: 32px;       --h2-lh: 1.25;
    --h3-size: 24px;       --h3-lh: 1.3;
    --body-lg: 32px;       --body-lg-lh: 1.5;
    --body-md: 24px;       --body-md-lh: 1.4;
    --body-sm: 16px;       --body-sm-lh: 1.5;
    --label: 15px;         --label-lh: 1.5;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { animation: none !important; transition: none !important; }
  }

  body {
    margin: 0;
    font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--white);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  /* Skip link */
  .skip-link {
    position: absolute;
    left: -9999px;
    top: 0;
    background: var(--ink);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 0 0 8px 0;
    z-index: 100;
    font-weight: 700;
  }
  .skip-link:focus { left: 0; }

  :focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 3px;
    border-radius: 4px;
  }
  /* Ensure focus ring is visible on dark backgrounds (e.g. the button) */
  .btn:focus-visible {
    outline: 3px solid #ffffff;
    box-shadow: 0 0 0 6px var(--ink);
  }
  /* Honour forced-colors / Windows high contrast mode */
  @media (forced-colors: active) {
    .btn { border: 2px solid; }
    :focus-visible { outline: 3px solid; }
  }

  /* ---------- Header / nav ---------- */
  .site-header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--card-border);
    z-index: 50;
  }
  .nav {
    max-width: 1400px;
    margin: 0 auto;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .brand {
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: 1.2;
    text-decoration: none;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }
  /* Logo sits beside the wordmark, ~3px taller than the 24px text on each side */
  .brand-logo { height: 30px; width: auto; display: block; flex: none; }
  /* Wordmark + tagline stack to the right of the logo, so the tagline only
     sits under "Access Insights", never under the logo */
  .brand-text { display: flex; flex-direction: column; }
  .brand small {
    font-weight: 400;
    font-size: 13px;
    color: #5b6275;
  }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: var(--label);
  }
  .nav-links a {
    display: inline-flex; flex-direction: column; align-items: center;
    text-decoration-line: none; text-decoration-color: var(--accent-magenta);
    text-decoration-thickness: 2px; text-underline-offset: 4px; color: inherit;
  }
  /* Reserve the extra-bold width up front so hover never nudges neighbours */
  .nav-links a::after {
    content: attr(data-text); font-weight: 800; height: 0; overflow: hidden;
    visibility: hidden; pointer-events: none; user-select: none;
  }
  /* On hover: magenta underline (text colour unchanged) + extra-bold weight */
  .nav-links a:hover { text-decoration-line: underline; font-weight: 800; }
  .nav-toggle { display: none; }

  /* ---------- Layout primitives ---------- */
  main { display: block; }

  .section {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 100px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--gap-section);
    text-align: center;
  }

  .eyebrow {
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: var(--h3-lh);
    margin: 0;
  }

  h1, h2 {
    font-weight: 700;
    font-size: var(--h1-size);
    line-height: var(--h1-lh);
    margin: 0;
    max-width: 895px;
  }
  /* Hero headline in Montserrat Black */
  h1 { font-weight: 900; }

  .lead {
    font-weight: 400;
    font-size: var(--body-lg);
    line-height: var(--body-lg-lh);
    margin: 0;
    max-width: var(--maxw);
  }

  /* Full-bleed image band */
  .image-band {
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
    aspect-ratio: 16 / 9;
    background: var(--img-placeholder);
    display: grid;
    place-items: center;
    color: #5b6275;
    font-size: var(--body-sm);
  }
  img.image-band {
    aspect-ratio: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }
  .image-band.short { aspect-ratio: 16 / 6; }
  .ph-label { color: #5b6275; font-size: var(--body-sm); }

  /* A stacked content block: bold title, subtitle, description */
  .feature {
    max-width: var(--maxw);
  }
  .feature h3 {
    font-weight: 700;
    font-size: var(--h2-size);
    line-height: var(--h2-lh);
    margin: 0 0 8px;
  }
  .feature .sub {
    font-size: var(--body-md);
    line-height: var(--body-md-lh);
    margin: 0 0 8px;
  }
  .feature .desc {
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
    margin: 0;
  }

  /* ---------- Metrics ---------- */
  .metrics {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .stat {
    background: var(--card-fill);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .stat .num {
    font-weight: 700;
    font-size: var(--stat-size);
    line-height: var(--stat-lh);
    margin: 0;
  }
  .stat .label {
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
    margin: 0;
  }

  /* ---------- Trust boxes (same card style as the metrics boxes) ---------- */
  .trust-boxes {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .trust-box {
    background: var(--card-fill);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .trust-box h3 {
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: var(--h3-lh);
    margin: 0;
  }
  .trust-box .desc {
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
    margin: 0;
  }
  /* Centre box: outline in the logo magenta — same 1px border width */
  .trust-box.is-center { border-color: var(--logo-magenta); }

  /* ---------- Team grid ---------- */
  .team {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 40px;
    row-gap: var(--gap-section);
  }
  .bio { }
  .bio .name {
    font-weight: 700;
    font-size: var(--h2-size);
    line-height: var(--h2-lh);
    margin: 0 0 4px;
  }
  .bio .role {
    font-size: var(--body-md);
    line-height: var(--body-md-lh);
    margin: 0 0 4px;
  }
  .bio .blurb {
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
    margin: 0;
  }

  /* ---------- Proto-Lab cards ---------- */
  .cards {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--img-placeholder);
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: #5b6275;
    font-size: var(--body-sm);
  }
  .card .kicker {
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
    margin: 0;
  }
  .card h3 {
    font-weight: 700;
    font-size: var(--h2-size);
    line-height: var(--h2-lh);
    margin: 0;
  }
  .card .desc {
    font-size: var(--body-md);
    line-height: var(--body-md-lh);
    margin: 0;
  }

  /* ---------- Buttons & links ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: var(--white);
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: 1.2;
    padding: 20px 40px;
    border-radius: 999px;
    border: none;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .btn:hover { opacity: 0.88; }

  .link-bold {
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: var(--h3-lh);
    text-decoration: underline;
    text-underline-offset: 4px;
  }
  .cta-link {
    font-weight: 700;
    font-size: var(--h3-size);
    line-height: var(--h3-lh);
    text-decoration: none;
  }
  .cta-link:hover { text-decoration: underline; }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--card-border);
    padding: 48px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    font-size: var(--body-sm);
    line-height: var(--body-sm-lh);
  }
  .site-footer a { text-decoration: none; }
  .site-footer a:hover { text-decoration: underline; }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    :root {
      --h1-size: 40px;
      --body-lg: 22px;
      --h2-size: 26px;
      --body-md: 20px;
      --stat-size: 38px;
    }
    .section { padding: 64px 20px; gap: 40px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .team { grid-template-columns: 1fr; }
    .cards { grid-template-columns: 1fr; }
    .trust-boxes { grid-template-columns: 1fr; }
    .nav-links {
      position: absolute;
      top: 100%;
      right: 0;
      left: 0;
      background: var(--white);
      flex-direction: column;
      gap: 0;
      border-bottom: 1px solid var(--card-border);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .nav-links.open { max-height: 320px; }
    .nav-links li { padding: 0 40px; }
    .nav-links a { display: block; padding: 16px 0; border-top: 1px solid var(--card-border); }
    .nav-toggle {
      display: inline-flex;
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  }
  @media (max-width: 480px) {
    .metrics { grid-template-columns: 1fr; }
  }

  /* ====================================================================
     In-page content editor (floating controls + edit mode)
     ==================================================================== */
  .editor-bar {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 200;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .editor-btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    line-height: 1;
    padding: 14px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .editor-btn:hover { opacity: 0.9; }
  .editor-btn:active { transform: translateY(1px); }
  .editor-btn--edit   { background: var(--ink); color: var(--white); }
  .editor-btn--commit { background: #1f7a3d; color: #ffffff; }
  .editor-btn--cancel { background: #ffffff; color: var(--ink); border: 1px solid var(--card-border); }

  /* Highlight editable fields while in edit mode */
  body.editing [data-edit] {
    outline: 2px dashed #1f7a3d;
    outline-offset: 3px;
    border-radius: 4px;
    cursor: text;
    transition: background 0.12s ease;
  }
  body.editing [data-edit]:hover { background: rgba(31,122,61,0.06); }
  body.editing [data-edit]:focus {
    outline: 2px solid #1f7a3d;
    background: rgba(31,122,61,0.08);
  }
  /* Small status pill shown after a commit / on info */
  .editor-status {
    position: fixed;
    right: 20px;
    bottom: 76px;
    z-index: 200;
    max-width: 320px;
    background: var(--ink);
    color: #fff;
    font-size: 13px;
    line-height: 1.45;
    padding: 12px 14px;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .editor-status.show { opacity: 1; transform: translateY(0); }

  @media print { .editor-bar, .editor-status { display: none !important; } }
</style>
</head>

<header class="site-header">

      <p class="sub" data-edit="pipeline_f1_sub"></p>

    <div class="feature">
      <h3 data-edit="pipeline_f2_title"></h3>

    </div>
    <div class="feature">
      <h3 data-edit="pipeline_f3_title"></h3>

  <!-- Strategic rationale -->
  <section class="section">
    <h2 data-edit="rationale_h2"></h2>
    <p class="lead" data-edit="rationale_lead"></p>
    <div class="feature">
      <h3 data-edit="rationale_f1_title"></h3>

      <p class="desc" data-edit="rationale_f1_desc"></p>

    <div class="feature">
      <h3 data-edit="rationale_f2_title"></h3>

    </div>
    <div class="feature">
      <h3 data-edit="rationale_f3_title"></h3>

  <!-- Proto-Lab -->

    <p class="eyebrow" data-edit="protolab_eyebrow"></p>
    <h2 data-edit="protolab_h2"></h2>
    <p class="lead" data-edit="protolab_lead"></p>
    <div class="cards">

  <!-- Building Momentum -->

<!-- Content lives here; loaded before the renderer below -->
<script src="content.js"></script>

<script>
  /* ---------- Mobile nav toggle ---------- */
  (function () {
    var toggle = document.querySelector('.nav-toggle');
    var links = document.getElementById('nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        toggle.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
      });
      links.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    }
  })();

  /* ====================================================================
     Content rendering + in-page editor
     ==================================================================== */
  (function () {
    var CONTENT = window.CONTENT || {};
    var fileHandle = null;          // remembered File System Access handle
    var editing = false;

    /* ---- Render content into the page ---- */
    function render() {
      document.querySelectorAll('[data-edit]').forEach(function (el) {
        var key = el.getAttribute('data-edit');
        if (Object.prototype.hasOwnProperty.call(CONTENT, key)) {
          el.textContent = CONTENT[key];
        } else if (!el.textContent) {
          el.textContent = '[' + key + ']';
        }
      });
    }

    /* ---- Build floating controls ---- */
    var bar = document.createElement('div');
    bar.className = 'editor-bar';

    var editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'editor-btn editor-btn--edit';
    editBtn.textContent = 'Edit content';

    var commitBtn = document.createElement('button');
    commitBtn.type = 'button';
    commitBtn.className = 'editor-btn editor-btn--commit';
    commitBtn.textContent = 'Commit changes';
    commitBtn.style.display = 'none';

    var cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'editor-btn editor-btn--cancel';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.display = 'none';

    bar.appendChild(cancelBtn);
    bar.appendChild(commitBtn);
    bar.appendChild(editBtn);
    document.body.appendChild(bar);

    var status = document.createElement('div');
    status.className = 'editor-status';
    status.setAttribute('role', 'status');
    document.body.appendChild(status);
    var statusTimer = null;
    function flash(msg, ms) {
      status.textContent = msg;
      status.classList.add('show');
      if (statusTimer) clearTimeout(statusTimer);
      statusTimer = setTimeout(function () { status.classList.remove('show'); }, ms || 4500);
    }

    var fields = function () { return document.querySelectorAll('[data-edit]'); };

    /* ---- Enter / exit edit mode ---- */
    function enterEdit() {
      editing = true;
      document.body.classList.add('editing');
      fields().forEach(function (el) {
        el.setAttribute('contenteditable', 'true');
        el.setAttribute('spellcheck', 'true');
      });
      editBtn.style.display = 'none';
      commitBtn.style.display = '';
      cancelBtn.style.display = '';
      flash('Edit mode on. Click any text to change it, then Commit changes.', 6000);
    }

    function exitEdit() {
      editing = false;
      document.body.classList.remove('editing');
      fields().forEach(function (el) {
        el.removeAttribute('contenteditable');
        el.removeAttribute('spellcheck');
      });
      editBtn.style.display = '';
      commitBtn.style.display = 'none';
      cancelBtn.style.display = 'none';
    }

    /* ---- Collect edited values back into a content object ---- */
    function collect() {
      var out = {};
      // Preserve original key order from CONTENT, then add any new keys.
      Object.keys(CONTENT).forEach(function (k) { out[k] = CONTENT[k]; });
      fields().forEach(function (el) {
        var key = el.getAttribute('data-edit');
        // normalise non-breaking spaces / stray whitespace contenteditable adds
        var val = el.textContent.replace(/ /g, ' ').replace(/[ \t]+\n/g, '\n').trim();
        out[key] = val;
      });
      return out;
    }

    /* ---- Serialise to a content.js file body ---- */
    function serialise(obj) {
      var lines = [];
      lines.push('/*');
      lines.push(' * Access Insights — site content');
      lines.push(' * --------------------------------');
      lines.push(' * Edit text on the page (Edit content button), then Commit changes to save.');
      lines.push(' * You can also edit the values below by hand. Keep the keys unchanged.');
      lines.push(' *');
      lines.push(' * Last committed: ' + new Date().toISOString());
      lines.push(' */');
      lines.push('window.CONTENT = {');
      var keys = Object.keys(obj);
      keys.forEach(function (k, i) {
        var comma = (i < keys.length - 1) ? ',' : '';
        lines.push('  ' + JSON.stringify(k) + ': ' + JSON.stringify(obj[k]) + comma);
      });
      lines.push('};');
      lines.push('');
      return lines.join('\n');
    }

    /* ---- Write back to content.js (File System Access API) or download ---- */
    async function commit() {
      var obj = collect();
      var body = serialise(obj);

      // Update in-memory + on-page immediately so the change is visible.
      CONTENT = obj;
      window.CONTENT = obj;
      render();

      var supportsFS = ('showSaveFilePicker' in window);
      if (supportsFS) {
        try {
          if (!fileHandle) {
            fileHandle = await window.showSaveFilePicker({
              suggestedName: 'content.js',
              types: [{ description: 'JavaScript', accept: { 'text/javascript': ['.js'] } }]
            });
          }
          var writable = await fileHandle.createWritable();
          await writable.write(body);
          await writable.close();
          exitEdit();
          flash('Saved to ' + (fileHandle.name || 'content.js') + '. Changes are live.', 5000);
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') {
            flash('Save cancelled — still in edit mode.', 3500);
            return; // stay in edit mode so nothing is lost
          }
          // fall through to download fallback on any other error
        }
      }

      // Fallback: download a fresh content.js to drop into the files/ folder.
      var blob = new Blob([body], { type: 'text/javascript' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'content.js';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      exitEdit();
      flash('Downloaded content.js — replace files/content.js with it to publish.', 7000);
    }

    /* ---- Wire up buttons ---- */
    editBtn.addEventListener('click', enterEdit);
    cancelBtn.addEventListener('click', function () {
      exitEdit();
      render(); // discard unsaved edits
      flash('Edits discarded.', 3000);
    });
    commitBtn.addEventListener('click', function () {
      commit().catch(function (e) {
        flash('Could not save: ' + (e && e.message ? e.message : e), 6000);
      });
    });

    // Warn before leaving with unsaved edits.
    window.addEventListener('beforeunload', function (e) {
      if (editing) { e.preventDefault(); e.returnValue = ''; }
    });

    render();
  })();
</script>
</body>
</html>
